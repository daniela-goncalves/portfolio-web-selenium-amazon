name: Selenium CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  executa-selenium:
    runs-on: ubuntu-latest

    steps:
      - name: Baixa o repositorio
        uses: actions/checkout@v4

      - name: Define o JDK 21 como a versão do Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Executa o selenium
        continue-on-error: true
        run: |
          echo "🚀 Executa o Selenium"
          mvn compile exec:java -Dexec.mainClass="br.com.dani.portfolio_web_selenium_amazon.FluxoPesquisaAmazon" -Dexec.args="automatizado"

      - name: Publica os Screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: ./screenshots/**
          retention-days: 1
